name: Generate Preview Gallery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/generate-previews.yml"
      - "index.json"
      - "scripts/generate-previews.js"
      - "scripts/update-readme-gallery.js"
      - "templates/**"

permissions:
  contents: write

jobs:
  previews:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install preview dependencies
        run: npm install --no-save --no-package-lock playwright sharp

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Generate preview images
        run: node scripts/generate-previews.js

      - name: Update README gallery
        run: node scripts/update-readme-gallery.js

      - name: Commit preview gallery
        run: |
          if git diff --quiet; then
            echo "Preview gallery is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/previews
          git commit -m "Update template preview gallery"
          git push
